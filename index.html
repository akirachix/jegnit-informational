<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <link rel="stylesheet" href="style.css">
    <title>AgriTech Informational Website</title>
</head>

<body>
    <header>
        <div class="logo_container">
            <img src="Images/AgriTecklogo.png" alt="Our logo" class="AgriTech_logo">
            <span>AgriTech</span>
        </div>
        <div class="hamburger" id="hamburger">
            <i class="fa-solid fa-bars"></i>
        </div>
        <nav id="nav-menu">
            <a href="#landing" id="home">Home</a>
            <a href="#app">Our app</a>
            <a href="#testimonials">About Us</a>
            <a href="#services">Services</a>
            <a href="#contact_us">Contact Us</a>
            <a href="#quiz">Faqs</a>
        </nav>
      </header>
      
    
        <div class="zoom-out">
            <div class="landing" id="landing">
                <h2 id="title">EMPOWERING AGRICULTURE <br>THROUGH SMART <br>CONNECTIONS</h2>
                <button id="the-services"><a href="#services">See All Services</a></button>
            </div>
            <div class="our-machines">
                <h1>Shop Our Top Categories</h1>
                <section class="machines">
                    <div id="plough"><img src="Images/PLOUGH.jpg" class="plough">
                        <h1 id="name">PLOUGHS</h1>
                    </div>
                    <div id="truck"><img src="Images/farmTruck.png" class="truck">
                        <h1 id="name">FARM TRUCK</h1>
                    </div>
                    <div id="tractor-category"><img src="Images/Tractor.png" class="tractor-category">
                        <h1 id="heading">TRACTORS</h1>
                    </div>
                    <div id="harvester"><img src="Images/harvester.jpg" class="harvester">
                        <h1 id="name">HARVESTERS</h1>
                    </div>
                    <div id="drones"><img src="Images/drones.jpg" class="drones">
                        <h1 id="heading">IRRIGATORS</h1>
                    </div>
                </section>
            </div>
    

    <script src="index.js"></script>
</body>
</html>
